<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification - TAT Certificate System</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .verification-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    .verification-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .verification-header h1 {
      font-size: 2rem;
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    .verification-header p {
      color: var(--text-secondary);
    }

    .verification-result {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .status-badge {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .status-badge.valid {
      background: #d4edda;
      color: #155724;
      border: 2px solid #c3e6cb;
    }

    .status-badge.invalid {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
    }

    .status-badge.revoked {
      background: #fff3cd;
      color: #856404;
      border: 2px solid #ffeaa7;
    }

    .certificate-details {
      margin-top: 20px;
    }

    .detail-row {
      display: flex;
      padding: 15px 0;
      border-bottom: 1px solid #e9ecef;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 600;
      color: var(--text-secondary);
      width: 200px;
      flex-shrink: 0;
    }

    .detail-value {
      color: var(--text-primary);
      flex: 1;
    }

    .verification-footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #e9ecef;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary-color);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #f5c6cb;
      text-align: center;
    }

    .back-button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: var(--primary-color);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.3s;
    }

    .back-button:hover {
      background: var(--primary-dark);
    }
  </style>
</head>
<body>
  <div class="verification-container">
    <div class="verification-header">
      <h1>🔍 Certificate Verification</h1>
      <p>Verify the authenticity of TAT certificates</p>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Verifying certificate...</p>
    </div>

    <div id="result" class="verification-result" style="display: none;">
      <!-- Result will be inserted here -->
    </div>
  </div>

  <script>
    // Get certificate ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const certificateId = urlParams.get('id') || window.location.pathname.split('/').pop();

    async function verifyCertificate() {
      try {
        const response = await fetch(`/api/verify/${certificateId}`);
        const data = await response.json();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('result').style.display = 'block';

        if (data.valid) {
          displayValidCertificate(data.certificate);
        } else if (data.message.includes('revoked')) {
          displayRevokedCertificate(data);
        } else {
          displayInvalidCertificate(data.message);
        }
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').innerHTML = `
          <div class="error-message">
            <h3>❌ Verification Failed</h3>
            <p>Unable to verify certificate. Please try again later.</p>
            <a href="/" class="back-button">Go to Home</a>
          </div>
        `;
      }
    }

    function displayValidCertificate(cert) {
      const currentDate = new Date().toLocaleDateString('en-IN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      document.getElementById('result').innerHTML = `
        <div class="status-badge valid">✅ Valid Certificate</div>
        
        <div class="certificate-details">
          <div class="detail-row">
            <span class="detail-label">Reference No:</span>
            <span class="detail-value"><strong>${cert.ref_no}</strong></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Student Name:</span>
            <span class="detail-value">${cert.student_name}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Registration No:</span>
            <span class="detail-value">${cert.reg_no}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Branch:</span>
            <span class="detail-value">${cert.branch_name}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Certificate Type:</span>
            <span class="detail-value">${cert.cert_type}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Company:</span>
            <span class="detail-value">${cert.company_name}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Issue Date:</span>
            <span class="detail-value">${new Date(cert.issue_date).toLocaleDateString('en-IN')}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Academic Year:</span>
            <span class="detail-value">${cert.academic_year}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Status:</span>
            <span class="detail-value" style="color: #28a745; font-weight: 600;">Active</span>
          </div>
        </div>
        
        <div class="verification-footer">
          <p>This certificate was issued by <strong>Trident Academy of Technology</strong></p>
          <p>Verified on: ${currentDate}</p>
          <a href="/" class="back-button">Go to Home</a>
        </div>
      `;
    }

    function displayRevokedCertificate(data) {
      document.getElementById('result').innerHTML = `
        <div class="status-badge revoked">⚠️ Certificate Revoked</div>
        
        <div class="certificate-details">
          <div class="detail-row">
            <span class="detail-label">Status:</span>
            <span class="detail-value" style="color: #856404; font-weight: 600;">Revoked</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Revoked On:</span>
            <span class="detail-value">${new Date(data.revoked_at).toLocaleDateString('en-IN')}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Reason:</span>
            <span class="detail-value">${data.revoked_reason || 'Not specified'}</span>
          </div>
        </div>
        
        <div class="verification-footer">
          <p>This certificate has been revoked and is no longer valid.</p>
          <p>For more information, please contact Trident Academy of Technology.</p>
          <a href="/" class="back-button">Go to Home</a>
        </div>
      `;
    }

    function displayInvalidCertificate(message) {
      document.getElementById('result').innerHTML = `
        <div class="status-badge invalid">❌ Invalid Certificate</div>
        
        <div class="certificate-details">
          <p style="text-align: center; color: var(--text-secondary); margin: 20px 0;">
            ${message || 'Certificate not found in our records.'}
          </p>
        </div>
        
        <div class="verification-footer">
          <p>This certificate could not be verified.</p>
          <p>Please ensure you have the correct certificate ID.</p>
          <a href="/" class="back-button">Go to Home</a>
        </div>
      `;
    }

    // Start verification on page load
    if (certificateId) {
      verifyCertificate();
    } else {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      displayInvalidCertificate('No certificate ID provided.');
    }
  </script>
</body>
</html>
